name: Audit dépendances (pip-audit)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Export dependency pins from pyproject.toml
        run: |
          python << 'PY'
          import sys
          from pathlib import Path

          try:
              import tomllib
          except ImportError:
              import tomli as tomllib  # type: ignore

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          project = data["project"]
          lines = []
          lines.extend(project.get("dependencies", []))
          optional = project.get("optional-dependencies", {})
          for group in ("api", "validation"):
              lines.extend(optional.get(group, []))
          Path("audit-requirements.txt").write_text(
              "\n".join(lines) + "\n", encoding="utf-8"
          )
          PY

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit -r audit-requirements.txt --desc --strict
